# Yazi theme — Gruvbox Material Light
# Warm cream background, earthy accents

[manager]
cwd = { fg = "#45707a" }

hovered         = { reversed = true }
preview_hovered = { underline = true }

# Find
find_keyword  = { fg = "#c35e0a", bold = true }
find_position = { fg = "#928374", italic = true }

# Markers
marker_copied   = { fg = "#6c782e", bg = "#6c782e" }
marker_cut      = { fg = "#c14a4a", bg = "#c14a4a" }
marker_selected = { fg = "#45707a", bg = "#45707a" }
marker_marked   = { fg = "#c35e0a", bg = "#c35e0a" }

# Tabs
tab_active   = { fg = "#fbf1c7", bg = "#654735" }
tab_inactive = { fg = "#928374", bg = "#f2e5bc" }
tab_width    = 1

# Count
count_copied   = { fg = "#4f3829", bg = "#e5d5ad" }
count_cut      = { fg = "#4f3829", bg = "#f9e0bb" }
count_selected = { fg = "#4f3829", bg = "#e5d5ad" }

[status]
separator_open  = ""
separator_close = ""

mode_normal = { fg = "#fbf1c7", bg = "#654735", bold = true }
mode_select = { fg = "#fbf1c7", bg = "#c14a4a", bold = true }
mode_unset  = { fg = "#fbf1c7", bg = "#928374", bold = true }

progress_label  = { fg = "#654735" }
progress_normal = { fg = "#45707a" }
progress_error  = { fg = "#c14a4a" }

[input]
border   = { fg = "#a89984" }
title    = {}
value    = {}
selected = { reversed = true }

[pick]
border   = { fg = "#a89984" }
active   = { fg = "#fbf1c7", bg = "#654735" }
inactive = {}

[confirm]
border  = { fg = "#a89984" }
title   = {}
content = {}
list    = {}
button_active  = { fg = "#fbf1c7", bg = "#654735", bold = true }
button_default = { fg = "#654735" }

[completion]
border   = { fg = "#a89984" }
active   = { reversed = true }
inactive = {}

[help]
on      = { fg = "#45707a" }
run     = { fg = "#6c782e" }
desc    = { fg = "#928374" }
hovered = { reversed = true }
footer  = { fg = "#928374" }

[notify]
title_info  = { fg = "#45707a" }
title_warn  = { fg = "#b47109" }
title_error = { fg = "#c14a4a" }

[filetype]
rules = [
    { name = "*/", fg = "#45707a", bold = true },

    { mime = "image/*", fg = "#b47109" },
    { mime = "video/*", fg = "#c35e0a" },
    { mime = "audio/*", fg = "#c35e0a" },

    { mime = "application/zip",  fg = "#945e80" },
    { mime = "application/gzip", fg = "#945e80" },
    { mime = "application/x-tar", fg = "#945e80" },
    { mime = "application/x-bzip2", fg = "#945e80" },
    { mime = "application/x-7z-compressed", fg = "#945e80" },
    { mime = "application/x-rar", fg = "#945e80" },

    { mime = "application/pdf", fg = "#c14a4a" },
    { mime = "application/doc", fg = "#c14a4a" },

    { name = "*.md", fg = "#6c782e" },
    { name = "*.txt", fg = "#6c782e" },
    { name = "*.json", fg = "#928374" },
    { name = "*.toml", fg = "#928374" },
    { name = "*.yaml", fg = "#928374" },
    { name = "*.yml", fg = "#928374" },

    { name = "*.py", fg = "#4c7a5d" },
    { name = "*.js", fg = "#b47109" },
    { name = "*.ts", fg = "#45707a" },
    { name = "*.lua", fg = "#945e80" },
    { name = "*.rs", fg = "#c14a4a" },
    { name = "*.go", fg = "#4c7a5d" },
    { name = "*.java", fg = "#c35e0a" },
    { name = "*.sh", fg = "#654735" },

    { name = "Makefile", fg = "#654735", bold = true },
    { name = "Dockerfile", fg = "#45707a", bold = true },

    { name = ".git*", fg = "#928374" },
    { name = ".env*", fg = "#c14a4a", bold = true },

    { name = "*", fg = "#654735" },
]
