# Yazi theme — Parchment
# Warm tan background, muted greens, slate blue, dusty wine, sienna, plum

[manager]
cwd = { fg = "#3c475a" }

hovered         = { reversed = true }
preview_hovered = { underline = true }

# Find
find_keyword  = { fg = "#6b3a20", bold = true }
find_position = { fg = "#6b3b42", italic = true }

# Markers
marker_copied   = { fg = "#2e4e20", bg = "#2e4e20" }
marker_cut      = { fg = "#5c2d33", bg = "#5c2d33" }
marker_selected = { fg = "#3c475a", bg = "#3c475a" }
marker_marked   = { fg = "#6b3a20", bg = "#6b3a20" }

# Tabs
tab_active   = { fg = "#e8dcc8", bg = "#2a3a2a" }
tab_inactive = { fg = "#534b3f", bg = "#cbc2ae" }
tab_width    = 1

# Count
count_copied   = { fg = "#1a2a1a", bg = "#b8c4a8" }
count_cut      = { fg = "#1a2a1a", bg = "#d4b8b0" }
count_selected = { fg = "#1a2a1a", bg = "#bfb6a2" }

[status]
separator_open  = ""
separator_close = ""

mode_normal = { fg = "#e8dcc8", bg = "#2a3a2a", bold = true }
mode_select = { fg = "#e8dcc8", bg = "#5c2d33", bold = true }
mode_unset  = { fg = "#e8dcc8", bg = "#3c475a", bold = true }

progress_label  = { fg = "#2a3a2a" }
progress_normal = { fg = "#3c475a" }
progress_error  = { fg = "#5c2d33" }

[input]
border   = { fg = "#3c475a" }
title    = {}
value    = {}
selected = { reversed = true }

[pick]
border   = { fg = "#3c475a" }
active   = { fg = "#e8dcc8", bg = "#3c475a" }
inactive = {}

[confirm]
border  = { fg = "#3c475a" }
title   = {}
content = {}
list    = {}
button_active  = { fg = "#e8dcc8", bg = "#3c475a", bold = true }
button_default = { fg = "#2a3a2a" }

[completion]
border   = { fg = "#3c475a" }
active   = { reversed = true }
inactive = {}

[help]
on      = { fg = "#3c475a" }
run     = { fg = "#2e4e20" }
desc    = { fg = "#534b3f" }
hovered = { reversed = true }
footer  = { fg = "#534b3f" }

[notify]
title_info  = { fg = "#3c475a" }
title_warn  = { fg = "#6b3a20" }
title_error = { fg = "#5c2d33" }

[filetype]
rules = [
    { name = "*/", fg = "#3c475a", bold = true },

    { mime = "image/*", fg = "#6b3a20" },
    { mime = "video/*", fg = "#7a4a28" },
    { mime = "audio/*", fg = "#7a4a28" },

    { mime = "application/zip",  fg = "#6b3b42" },
    { mime = "application/gzip", fg = "#6b3b42" },
    { mime = "application/x-tar", fg = "#6b3b42" },
    { mime = "application/x-bzip2", fg = "#6b3b42" },
    { mime = "application/x-7z-compressed", fg = "#6b3b42" },
    { mime = "application/x-rar", fg = "#6b3b42" },

    { mime = "application/pdf", fg = "#5c2d33" },
    { mime = "application/doc", fg = "#5c2d33" },

    { name = "*.md", fg = "#2e4e20" },
    { name = "*.txt", fg = "#2e4e20" },
    { name = "*.json", fg = "#534b3f" },
    { name = "*.toml", fg = "#534b3f" },
    { name = "*.yaml", fg = "#534b3f" },
    { name = "*.yml", fg = "#534b3f" },

    { name = "*.py", fg = "#2e4e3e" },
    { name = "*.js", fg = "#6b3a20" },
    { name = "*.ts", fg = "#3c475a" },
    { name = "*.lua", fg = "#4c3050" },
    { name = "*.rs", fg = "#5c2d33" },
    { name = "*.go", fg = "#2e4e3e" },
    { name = "*.java", fg = "#6b3b42" },
    { name = "*.sh", fg = "#1f401f" },

    { name = "Makefile", fg = "#1f401f", bold = true },
    { name = "Dockerfile", fg = "#3c475a", bold = true },

    { name = ".git*", fg = "#534b3f" },
    { name = ".env*", fg = "#5c2d33", bold = true },

    { name = "*", fg = "#2a3a2a" },
]
