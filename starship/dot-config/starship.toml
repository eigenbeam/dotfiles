# Starship prompt configuration
# Docs: https://starship.rs/config/
# Theme: Gruvbox Material Light

command_timeout = 1000
add_newline = true

format = """
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$rust\
$go\
$lua\
$cmd_duration\
$line_break\
$character"""

[character]
success_symbol = '[>](bold #654735)'
error_symbol = '[>](bold #c14a4a)'

[directory]
style = 'bold #45707a'
truncation_length = 3
truncate_to_repo = true

[git_branch]
style = 'bold #6c782e'
format = '[$symbol$branch(:$remote_branch)]($style) '

[git_status]
style = '#c14a4a'
format = '([$all_status$ahead_behind]($style) )'

[cmd_duration]
min_time = 2_000
style = '#928374'
format = '[$duration]($style) '

[python]
style = '#928374'
format = '[$symbol$version]($style) '

[nodejs]
style = '#928374'
format = '[$symbol$version]($style) '

[rust]
style = '#928374'
format = '[$symbol$version]($style) '

[golang]
style = '#928374'
format = '[$symbol$version]($style) '

[lua]
style = '#928374'
format = '[$symbol$version]($style) '
