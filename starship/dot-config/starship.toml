# Starship prompt configuration
# Docs: https://starship.rs/config/
# Theme: Parchment (muted greens, slate blue, dusty wine, sienna)

command_timeout = 1000
add_newline = true

format = """
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$rust\
$go\
$lua\
$cmd_duration\
$line_break\
$character"""

[character]
success_symbol = '[>](bold #1f401f)'
error_symbol = '[>](bold #5c2d33)'

[directory]
style = 'bold #3c475a'
truncation_length = 3
truncate_to_repo = true

[git_branch]
style = 'bold #2e4e20'
format = '[$symbol$branch(:$remote_branch)]($style) '

[git_status]
style = '#5c2d33'
format = '([$all_status$ahead_behind]($style) )'

[cmd_duration]
min_time = 2_000
style = '#534b3f'
format = '[$duration]($style) '

[python]
style = '#3c475a'
format = '[$symbol$version]($style) '

[nodejs]
style = '#3c475a'
format = '[$symbol$version]($style) '

[rust]
style = '#3c475a'
format = '[$symbol$version]($style) '

[golang]
style = '#3c475a'
format = '[$symbol$version]($style) '

[lua]
style = '#3c475a'
format = '[$symbol$version]($style) '
