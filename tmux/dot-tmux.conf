set -g prefix C-a
unbind C-b

# Core settings
set -s escape-time 10
set -s focus-events on
set -g mouse on
set -g mode-keys vi
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g display-time 2000

# Terminal colors
set-option -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Status bar (Zenbones Light)
set-option -g status-position top
set -g status-style 'fg=#2C363C,bg=#F0EDEC'
set -g status-left '#[fg=#F0EDEC,bg=#2C363C,bold] #S #[default] '
set -g status-right '#[fg=#88507D]%H:%M '
set -g status-left-length 30
setw -g window-status-current-format '#[fg=#2C363C,bg=#CBD9E3,bold] #I:#W #[default]'
setw -g window-status-format '#[fg=#4F5E68] #I:#W #[default]'

# Copy/selection mode highlighting
set -g mode-style 'bg=#CBD9E3,fg=#2C363C'

# Pane borders
set -g pane-border-style 'fg=#CFC1BA'
set -g pane-active-border-style 'fg=#286486'
set -g pane-border-indicators colour

# Inactive pane dimming
set -g window-style 'bg=#E0E0E0'
set -g window-active-style 'bg=#F0EDEC'

# Activity
setw -g monitor-activity on
set -g visual-activity off

# Smart-splits navigation (seamless nvim/tmux with @pane-is-vim variable)
bind-key -n C-h if -F "#{@pane-is-vim}" 'send-keys C-h' 'select-pane -L'
bind-key -n C-j if -F "#{@pane-is-vim}" 'send-keys C-j' 'select-pane -D'
bind-key -n C-k if -F "#{@pane-is-vim}" 'send-keys C-k' 'select-pane -U'
bind-key -n C-l if -F "#{@pane-is-vim}" 'send-keys C-l' 'select-pane -R'

bind-key -n M-h if -F "#{@pane-is-vim}" 'send-keys M-h' 'resize-pane -L 3'
bind-key -n M-j if -F "#{@pane-is-vim}" 'send-keys M-j' 'resize-pane -D 3'
bind-key -n M-k if -F "#{@pane-is-vim}" 'send-keys M-k' 'resize-pane -U 3'
bind-key -n M-l if -F "#{@pane-is-vim}" 'send-keys M-l' 'resize-pane -R 3'

# TPM & plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-logging'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @open-S 'https://www.duckduckgo.com/'
set -g @continuum-restore 'on'

# Auto-install TPM if missing, then load it
set-environment -g TMUX_PLUGIN_MANAGER_PATH "~/.tmux/plugins/"
if-shell '[ ! -d ~/.tmux/plugins/tpm ]' \
  'run-shell "git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm"'
run-shell '[ -d ~/.tmux/plugins/tmux-sensible ] || ~/.tmux/plugins/tpm/bin/install_plugins'
run-shell -b '~/.tmux/plugins/tpm/tpm'
