set -g prefix C-a
unbind C-b

# Core settings
set -s escape-time 10
set -s focus-events on
set -g mouse on
set -g mode-keys vi
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g display-time 2000

# Terminal colors
set-option -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Status bar (Base2Tone EveningDark: purple bg, lavender fg, orange accents)
set-option -g status-position top
set -g status-style 'fg=#bab8c7,bg=#2a2734'
set -g status-left '#[fg=#eeebff,bg=#545167,bold] #S #[default] '
set -g status-right '#[fg=#bab8c7]%H:%M '
set -g status-left-length 30
setw -g window-status-current-format '#[fg=#2a2734,bg=#e09142,bold] #I:#W #[default]'
setw -g window-status-format '#[fg=#8e8aa3] #I:#W #[default]'

# Pane borders
set -g pane-border-style 'fg=#545167'
set -g pane-active-border-style 'fg=#e09142'

# Activity
setw -g monitor-activity on
set -g visual-activity off

# Smart-splits navigation (seamless nvim/tmux with @pane-is-vim variable)
bind-key -n C-h if -F "#{@pane-is-vim}" 'send-keys C-h' 'select-pane -L'
bind-key -n C-j if -F "#{@pane-is-vim}" 'send-keys C-j' 'select-pane -D'
bind-key -n C-k if -F "#{@pane-is-vim}" 'send-keys C-k' 'select-pane -U'
bind-key -n C-l if -F "#{@pane-is-vim}" 'send-keys C-l' 'select-pane -R'

bind-key -n M-h if -F "#{@pane-is-vim}" 'send-keys M-h' 'resize-pane -L 3'
bind-key -n M-j if -F "#{@pane-is-vim}" 'send-keys M-j' 'resize-pane -D 3'
bind-key -n M-k if -F "#{@pane-is-vim}" 'send-keys M-k' 'resize-pane -U 3'
bind-key -n M-l if -F "#{@pane-is-vim}" 'send-keys M-l' 'resize-pane -R 3'

# TPM & plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-logging'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @open-S 'https://www.duckduckgo.com/'
set -g @continuum-restore 'on'

if "test ! -d ~/.tmux/plugins/tmux-sensible" \
  "run '#{HOMEBREW_PREFIX}/opt/tpm/share/tpm/bin/install_plugins'"
run -b '#{HOMEBREW_PREFIX}/opt/tpm/share/tpm/tpm'
